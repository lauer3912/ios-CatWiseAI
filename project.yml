name: CatWiseAI
options:
  bundleIdPrefix: com.ggsheng
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 9L6N2ZF26B
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  SnapKit:
    url: https://github.com/SnapKit/SnapKit.git
    version: "5.7.1"
  DGCharts:
    url: https://github.com/ChartsOrg/Charts.git
    version: "5.1.0"

targets:
  CatWiseAI:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Screens
      - path: Components
      - path: Models
      - path: Services
      - path: Utilities
      - path: Resources
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.CatWiseAI
        PRODUCT_NAME: CatWiseAI
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: Resources/CatWiseAI.entitlements
      configs:
        Debug:
          CODE_SIGNING_ALLOWED: NO
        Release:
          CODE_SIGNING_ALLOWED: YES
    entitlements:
      path: Resources/CatWiseAI.entitlements
    dependencies:
      - package: SnapKit
      - package: DGCharts

  CatWiseAITests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/CatWiseAITests
    dependencies:
      - target: CatWiseAI
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.CatWiseAITests
        PRODUCT_NAME: CatWiseAITests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CatWiseAI.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/CatWiseAI"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9L6N2ZF26B
      configs:
        Debug:
          CODE_SIGNING_ALLOWED: NO
        Release:
          CODE_SIGNING_ALLOWED: YES

  CatWiseAIUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/CatWiseAIUITests
    dependencies:
      - target: CatWiseAI
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.CatWiseAIUITests
        PRODUCT_NAME: CatWiseAIUITests
        TEST_TARGET: "$(BUILT_PRODUCTS_DIR)/CatWiseAI.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/CatWiseAI"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9L6N2ZF26B
      configs:
        Debug:
          CODE_SIGNING_ALLOWED: NO
        Release:
          CODE_SIGNING_ALLOWED: YES

schemes:
  CatWiseAI:
    build:
      targets:
        CatWiseAI: all
        CatWiseAIUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CatWiseAIUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release